  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
          sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
        },
        colors: {
          ink: '#0a0a1a',
          surface: '#141432',
          surface2: '#1c1c44',
          line: '#2a2a55',
          brand: '#4f46e5',
          brand2: '#7c6dff',

        },
        keyframes: {
          float: { '0%,100%':{transform:'translateY(0)'}, '50%':{transform:'translateY(-6px)'} },
          shimmer: { '0%':{backgroundPosition:'-200% 0'}, '100%':{backgroundPosition:'200% 0'} },

<style>
  html, body { background: #0a0a1a; color: #e6e6f5; font-family: 'DM Sans', system-ui, sans-serif; }

  .status-delayed { color:#ef4444; background: rgba(239,68,68,.10); border:1px solid rgba(239,68,68,.35); }
  .status-boarding { color:#fbbf24; background: rgba(251,191,36,.10); border:1px solid rgba(251,191,36,.35); }

<script>
/* =========================================================================
   SkyTrack Pro — Single-file demo
   - Hash router
   - Mock flight + airport data
   - Simulated real-time updates
   - localStorage for fake auth + saved flights
   ========================================================================= */

/* ----------------------------- Mock Data --------------------------------- */
const AIRLINES = {

const AIRPORTS = [

  ['EWR','Newark Liberty','Newark','USA'],
  ['ORD','O’Hare Intl','Chicago','USA'],
  ['LAX','Los Angeles Intl','Los Angeles','USA'],
  ['SFO','San Francisco Intl','San Francisco','USA'],
  ['ATL','Hartsfield-Jackson','Atlanta','USA'],
  ['SIN','Changi','Singapore','Singapore'],
  ['HKG','Hong Kong Intl','Hong Kong','Hong Kong'],
  ['NRT','Narita','Tokyo','Japan'],
  ['HND','Haneda','Tokyo','Japan'],
  ['ICN','Incheon','Seoul','South Korea'],
  ['SYD','Kingsford Smith','Sydney','Australia'],
  ['MEL','Tullamarine','Melbourne','Australia'],
  ['YYZ','Toronto Pearson','Toronto','Canada'],
];

const AIRPORT_MAP = Object.fromEntries(AIRPORTS.map(a => [a[0], { code:a[0], name:a[1], city:a[2], country:a[3] }]));

// Statuses: scheduled, boarding, departed, landed, delayed, cancelled
function mkFlight(no, from, to, schedDep, schedArr, status, opts={}) {
  const code = no.match(/^[A-Z0-9]{2}/)[0];
  return {
    flightNo: no,
    airline: AIRLINES[code] ? AIRLINES[code].name : 'Unknown',
    airlineCode: code,
    from, to,
    schedDep, schedArr,
    actualDep: opts.actualDep || schedDep,
    actualArr: opts.actualArr || schedArr,
    status,
    gate: opts.gate || (['A','B','C','D'][Math.floor(Math.random()*4)] + (10+Math.floor(Math.random()*30))),
    terminal: opts.terminal || String(1 + Math.floor(Math.random()*3)),
    baggage: opts.baggage || ('B' + (1+Math.floor(Math.random()*8))),
    aircraft: opts.aircraft || pick(['Boeing 777-300ER','Airbus A320neo','Boeing 787-9','Airbus A350-900','Boeing 737 MAX 8']),
    delayMin: opts.delayMin || 0,
    weatherRisk: opts.weatherRisk ?? Math.floor(Math.random()*40),
    onTimeProb: opts.onTimeProb ?? (60 + Math.floor(Math.random()*39)),
    note: opts.note || '',
  };
}
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

// Generate today-relative timestamps
const todayBase = (h, m=0, dayOffset=0) => {
  const d = new Date();
  d.setDate(d.getDate() + dayOffset);
  d.setHours(h, m, 0, 0);
  return d.toISOString();
};

const FLIGHTS = {
  'AI101':  mkFlight('AI101', 'DEL','BOM', todayBase(9,30), todayBase(11,45), 'boarding', { gate:'B12', terminal:'3', delayMin:0, onTimeProb:88, weatherRisk:22 }),
  'AI202':  mkFlight('AI202', 'BOM','DXB', todayBase(13,15), todayBase(15,5), 'scheduled', { gate:'C04', onTimeProb:92, weatherRisk:10 }),
  'EK501':  mkFlight('EK501', 'DXB','LHR', todayBase(7,45), todayBase(12,30), 'departed', { actualDep: todayBase(7,52), gate:'A22', onTimeProb:81, weatherRisk:35 }),
  'EK202':  mkFlight('EK202', 'DXB','JFK', todayBase(8,30), todayBase(14,15), 'delayed', { actualDep: todayBase(9,45), gate:'B08', terminal:'3', delayMin:75, onTimeProb:42, weatherRisk:78, note:'Air-traffic congestion at JFK' }),
  'BA117':  mkFlight('BA117', 'LHR','JFK', todayBase(10,0), todayBase(13,15), 'departed', { actualDep: todayBase(10,8), gate:'A14', onTimeProb:86, weatherRisk:18 }),
  'UA901':  mkFlight('UA901', 'SFO','FRA', todayBase(18,20), todayBase(13,40,1), 'scheduled', { gate:'G92', terminal:'3', onTimeProb:79, weatherRisk:30 }),
  'SQ423':  mkFlight('SQ423', 'SIN','BOM', todayBase(20,5), todayBase(22,55), 'scheduled', { gate:'C18', onTimeProb:94, weatherRisk:12 }),
  'QR570':  mkFlight('QR570', 'DOH','DEL', todayBase(2,30), todayBase(9,45), 'landed', { actualArr: todayBase(9,38), baggage:'B4', onTimeProb:96, weatherRisk:8 }),
  'LH760':  mkFlight('LH760', 'FRA','BLR', todayBase(22,15), todayBase(11,40,1), 'boarding', { gate:'Z25', terminal:'1', onTimeProb:84, weatherRisk:20 }),
  'AF226':  mkFlight('AF226', 'CDG','SFO', todayBase(10,40), todayBase(13,5), 'departed', { actualDep: todayBase(10,55), gate:'K42', onTimeProb:73, weatherRisk:40 }),
  '6E2134': mkFlight('6E2134','BLR','DEL', todayBase(14,20), todayBase(17,5), 'scheduled', { gate:'D11', onTimeProb:90, weatherRisk:14 }),
  'DL19':   mkFlight('DL19',  'JFK','LAX', todayBase(15,30), todayBase(18,50), 'scheduled', { gate:'B23', terminal:'4', onTimeProb:82, weatherRisk:22 }),
  'TK1980': mkFlight('TK1980','IST','LHR', todayBase(11,0), todayBase(13,5), 'cancelled', { note:'Cancelled due to operational reasons', onTimeProb:0, weatherRisk:60 }),
  'KL875':  mkFlight('KL875', 'AMS','HKG', todayBase(13,45), todayBase(8,30,1), 'departed', { actualDep: todayBase(13,52), gate:'E07', onTimeProb:88, weatherRisk:25 }),
};

/* ----------------------------- Storage ----------------------------------- */
const LS = {
  user: 'skytrack:user',
  saved: 'skytrack:saved',
  theme: 'skytrack:theme',
  mode:  'skytrack:passmode',
};
function getUser(){ try { return JSON.parse(localStorage.getItem(LS.user)||'null'); } catch { return null; } }
function setUser(u){ localStorage.setItem(LS.user, JSON.stringify(u)); }
function clearUser(){ localStorage.removeItem(LS.user); }
function getSaved(){ try { return JSON.parse(localStorage.getItem(LS.saved)||'[]'); } catch { return []; } }
function setSaved(arr){ localStorage.setItem(LS.saved, JSON.stringify(arr)); }
function getPassMode(){ return localStorage.getItem(LS.mode) || 'traveller'; }
function setPassMode(m){ localStorage.setItem(LS.mode, m); }

/* ----------------------------- Helpers ----------------------------------- */
function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString([], {weekday:'short', day:'numeric', month:'short'});
}
function durationBetween(a, b){
  const ms = new Date(b) - new Date(a);
  const m = Math.max(0, Math.round(ms/60000));
  const h = Math.floor(m/60), mm = m%60;
  return `${h}h ${mm}m`;
}
function minutesUntil(iso){
  return Math.round((new Date(iso) - Date.now())/60000);
}
function statusClass(s){
  return ({
    'on-time':'status-ontime', 'scheduled':'status-scheduled', 'boarding':'status-boarding',
    'departed':'status-departed', 'landed':'status-landed', 'delayed':'status-delayed', 'cancelled':'status-cancelled'
  })[s] || 'status-scheduled';
}
function statusLabel(s){
  return s === 'on-time' ? 'On Time' : s.charAt(0).toUpperCase()+s.slice(1);
}
function el(html){ const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function toast(msg, kind='info'){
  const root = document.getElementById('toast-root');
  const t = el(`<div class="toast"><span class="mr-2">${kind==='error'?'⚠️':kind==='success'?'✅':'ℹ️'}</span>${escapeHtml(msg)}</div>`);
  root.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; }, 2200);
  setTimeout(()=>{ t.remove(); }, 2600);
}

/* ----------------------------- API layer (swappable) -------------------- */
// Swap this implementation to call AviationStack later — same Promise contract.
async function fetchFlight(no){
  await new Promise(r => setTimeout(r, 120));
  try {
    const f = FLIGHTS[no.toUpperCase()];
    if (!f) throw new Error('not found');
    // mutate live values slightly
    return { ...f, _fetchedAt: Date.now() };
  } catch (e) {
    toast('Using cached data (offline fallback)', 'info');
    return null;
  }
}
async function searchFlights({ q, mode }){
  await new Promise(r => setTimeout(r, 100));
  const all = Object.values(FLIGHTS);
  const Q = (q||'').trim().toUpperCase();
  if (!Q) return all.slice(0, 8);
  if (mode === 'flight') return all.filter(f => f.flightNo.includes(Q));
  if (mode === 'route') {
    const parts = Q.split(/[-→ >]+/).filter(Boolean);
    if (parts.length >= 2) return all.filter(f => f.from === parts[0] && f.to === parts[1]);
    return all.filter(f => f.from === Q || f.to === Q);
  }
  if (mode === 'airport') return all.filter(f => f.from === Q || f.to === Q);
  return all.filter(f => f.flightNo.includes(Q) || f.from===Q || f.to===Q);
}

/* ----------------------------- Simulated live updates -------------------- */
setInterval(() => {
  // progress statuses gradually
  Object.values(FLIGHTS).forEach(f => {
    if (f.status === 'scheduled' && minutesUntil(f.schedDep) < 45 && minutesUntil(f.schedDep) > 5 && Math.random() < 0.15) {
      f.status = 'boarding';
    } else if (f.status === 'boarding' && minutesUntil(f.schedDep) <= 0 && Math.random() < 0.2) {
      f.status = 'departed';
      f.actualDep = new Date().toISOString();
    } else if (f.status === 'departed' && minutesUntil(f.schedArr) <= 0 && Math.random() < 0.2) {
      f.status = 'landed';
      f.actualArr = new Date().toISOString();
    } else if (f.status === 'delayed' && Math.random() < 0.05) {
      f.delayMin += 5;
    }
  });
  // notify current route to refresh if flight page
  if (location.hash.startsWith('#/flight/')) renderRoute();
  if (location.hash.startsWith('#/dashboard')) renderRoute();
}, 30000);

/* ============================== UI ====================================== */

/* ---- Header ---- */
function Header(){

      <a href="#/" class="flex items-center gap-2 group">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand to-brand2 grid place-items-center shadow-glow">
          <svg viewBox="0 0 24 24" class="w-5 h-5 text-white" fill="currentColor"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1L15 22v-1.5L13 19v-5.5L21 16z"/></svg>
        </div>
        <div class="leading-tight">
          <div class="font-display font-bold text-lg">SkyTrack <span class="shimmer-text">Pro</span></div>
          <div class="text-[10px] uppercase tracking-widest muted -mt-0.5">Track smarter</div>
        </div>
      </a>
      <nav class="hidden md:flex items-center gap-1 text-sm">
        <a href="#/" class="px-3 py-2 rounded-lg hover:bg-white/5">Home</a>
        <a href="#/search" class="px-3 py-2 rounded-lg hover:bg-white/5">Search</a>
        <a href="#/dashboard" class="px-3 py-2 rounded-lg hover:bg-white/5">Dashboard</a>
      </nav>
      <div class="flex items-center gap-2">
        <button id="themeToggle" class="btn-ghost rounded-lg w-9 h-9 grid place-items-center" title="Toggle theme">
          <svg viewBox="0 0 24 24" class="w-4 h-4" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36A5.5 5.5 0 0 1 12 3z"/></svg>
        </button>
        ${u ? `
          <div class="chip rounded-full pl-1 pr-3 py-1 flex items-center gap-2 text-sm">
            <span class="w-6 h-6 rounded-full bg-gradient-to-br from-brand to-mint grid place-items-center text-[10px] font-bold text-ink">${escapeHtml((u.email||'?')[0].toUpperCase())}</span>
            <span class="hidden sm:inline">${escapeHtml(u.email)}</span>
            <button id="logoutBtn" class="muted hover:text-white text-xs ml-1">Sign out</button>
          </div>` : `
          <a href="#/login" class="btn-primary rounded-lg px-4 py-2 text-sm font-medium">Sign in</a>
        `}
      </div>
    </div>
  </header>`;
}
function bindHeader(){
  const tt = document.getElementById('themeToggle');
  if (tt) tt.onclick = () => {
    const isLight = document.documentElement.classList.toggle('light');
    document.documentElement.classList.toggle('dark', !isLight);
    localStorage.setItem(LS.theme, isLight ? 'light' : 'dark');
  };
  const lo = document.getElementById('logoutBtn');
  if (lo) lo.onclick = (e) => { e.preventDefault(); clearUser(); toast('Signed out', 'success'); renderRoute(); };
}

/* ---- Footer ---- */
function Footer(){
  return `
  <footer class="mt-20 border-t border-line/60">
    <div class="max-w-7xl mx-auto px-5 py-10 grid md:grid-cols-3 gap-8 text-sm">

function bindSearchBar(container, { mode='flight', onSubmit }={}){
  let curMode = mode;
  const input = container.querySelector('#searchInput');
  const drop = container.querySelector('#acDrop');
  const form = container.querySelector('#searchForm');

  container.querySelectorAll('.ac-mode').forEach(b => b.onclick = (e) => {
    e.preventDefault();
    curMode = b.dataset.mode;
    container.querySelectorAll('.ac-mode').forEach(x => x.classList.remove('!bg-brand','!text-white','!border-brand'));
    b.classList.add('!bg-brand','!text-white','!border-brand');
    input.focus();
    runAC();
  });

  function buildSuggestions(q){
    q = (q||'').trim().toUpperCase();
    if (curMode === 'flight') {
      const list = Object.values(FLIGHTS);
      const pool = q ? list.filter(f => f.flightNo.includes(q)) : list.slice(0,6);
      return pool.slice(0,6).map(f => ({
        label: f.flightNo, sub: `${f.airline} · ${f.from} → ${f.to}`,
        value: f.flightNo, icon: '✈️'
      }));
    }
    if (curMode === 'airport') {
      const pool = q ? AIRPORTS.filter(a => a[0].includes(q) || a[2].toUpperCase().includes(q) || a[1].toUpperCase().includes(q)) : AIRPORTS.slice(0,6);
      return pool.slice(0,6).map(a => ({ label: a[0], sub: `${a[1]} · ${a[2]}`, value: a[0], icon: '🛫' }));
    }
    if (curMode === 'route') {
      const pool = q ? AIRPORTS.filter(a => a[0].includes(q) || a[2].toUpperCase().includes(q)) : AIRPORTS.slice(0,6);
      return pool.slice(0,6).map(a => ({ label: a[0], sub: `${a[2]} — type ${a[0]} → DEST`, value: a[0], icon: '🌐' }));
    }
    return [];
  }

  function runAC(){
    const items = buildSuggestions(input.value);
    if (!items.length) { drop.classList.add('hidden'); drop.innerHTML=''; return; }
    drop.innerHTML = items.map(it => `
      <button type="button" data-val="${escapeHtml(it.value)}" class="ac-item w-full text-left px-4 py-3 flex items-center gap-3 border-b border-line/40 last:border-0">
        <span class="w-8 h-8 grid place-items-center rounded-lg bg-white/5">${it.icon}</span>
        <div class="flex-1">
          <div class="font-display font-semibold">${escapeHtml(it.label)}</div>
          <div class="text-xs muted">${escapeHtml(it.sub)}</div>
        </div>
        <span class="text-xs muted">↵</span>
      </button>`).join('');
    drop.classList.remove('hidden');
    drop.querySelectorAll('.ac-item').forEach(b => b.onclick = () => {
      input.value = b.dataset.val;
      drop.classList.add('hidden');
      submit();
    });
  }
  input.addEventListener('input', runAC);
  input.addEventListener('focus', runAC);
  document.addEventListener('click', (e) => {
    if (!container.contains(e.target)) drop.classList.add('hidden');
  });

  function submit(){
    const v = input.value.trim();
    if (!v) { toast('Type a flight number, route, or airport'); return; }
    if (onSubmit) onSubmit({ q: v, mode: curMode });
    else {
      // Default behavior: navigate to flight if it matches a known flight number, else to search page
      const upper = v.toUpperCase().replace(/\s+/g,'');
      if (FLIGHTS[upper]) location.hash = `#/flight/${upper}`;
      else location.hash = `#/search?q=${encodeURIComponent(v)}&mode=${curMode}`;
    }
  }
  form.addEventListener('submit', (e) => { e.preventDefault(); submit(); });
}

/* ---- Timeline ---- */
function Timeline(f){
  const order = ['scheduled','boarding','departed','landed'];
  const cancelled = f.status === 'cancelled';
  let activeIdx = order.indexOf(f.status === 'delayed' ? 'scheduled' : f.status);
  if (activeIdx < 0) activeIdx = 0;
  const pct = cancelled ? 0 : ((activeIdx) / (order.length-1)) * 100;
  const labels = ['Scheduled','Boarding','Departed','Landed'];
  return `
  <div class="glass rounded-2xl p-6">
    <div class="flex items-center justify-between mb-4">
      <div class="font-display font-bold">Flight Progress</div>
      ${cancelled ? `<span class="text-xs status-cancelled px-2 py-1 rounded-full">Cancelled</span>` : ''}
    </div>
    <div class="tl-bar mb-4"><i style="width:${pct}%"></i></div>
    <div class="grid grid-cols-4 gap-2">
      ${labels.map((l,i) => {
        const cls = cancelled ? '' : (i < activeIdx ? 'done' : i === activeIdx ? 'active' : '');
        return `<div class="tl-step ${cls} flex flex-col items-center gap-2 text-center">
          <div class="dot"></div>
          <div class="text-xs ${i<=activeIdx?'':'muted'}">${l}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

/* ---- Insights Panel ---- */
function InsightsPanel(f){
  const items = [];
  if (f.weatherRisk >= 60) items.push({ icon:'🌧️', t:'High weather risk', s:`Likely turbulence/delay at ${f.to}`, tone:'danger' });
  else if (f.weatherRisk >= 35) items.push({ icon:'☁️', t:'Moderate weather impact', s:`Minor delay possible at ${f.to}`, tone:'warn' });
  else items.push({ icon:'☀️', t:'Clear skies', s:'Weather looks favorable', tone:'mint' });

  if (f.status === 'cancelled') items.push({ icon:'❌', t:'Flight cancelled', s: f.note || 'Contact your airline', tone:'danger' });
  else if (f.delayMin > 30) items.push({ icon:'⏱️', t:`Delayed by ${f.delayMin} min`, s: f.note || 'Air traffic congestion', tone:'danger' });
  else items.push({ icon:'✅', t:'No reported issues', s:'Operations normal', tone:'mint' });

  items.push({ icon:'📊', t:`On-time probability ${f.onTimeProb}%`, s: `Based on route history & current ops`, tone:'info' });

  const toneCls = { danger:'text-danger', warn:'text-warn', mint:'text-mint', info:'text-info' };
  return `
  <div class="glass rounded-2xl p-6">
    <div class="flex items-center justify-between mb-4">
      <div class="font-display font-bold">Smart Insights</div>
      <span class="text-[10px] uppercase tracking-widest muted">AI-generated · demo</span>
    </div>
    <div class="space-y-3">
      ${items.map(i => `
        <div class="flex items-start gap-3 p-3 rounded-xl bg-white/5">
          <div class="text-xl">${i.icon}</div>

            <div class="font-medium ${toneCls[i.tone]||''}">${escapeHtml(i.t)}</div>

        </div>`).join('')}
    </div>
  </div>`;
}

/* ---- Countdown / Time to Gate ---- */
function CountdownPanel(f, mode){
  const isPickup = mode === 'pickup';
  const target = isPickup ? f.actualArr : f.schedDep;
  const mins = minutesUntil(target);
  let label, sub;
  if (isPickup) {
    if (mins > 0) { label = `Lands in ${formatHM(mins)}`; sub = `Recommended airport arrival ${minOffset(target, -15)}`; }
    else { label = `Landed ${fmtTime(f.actualArr)}`; sub = 'Head to baggage claim ' + f.baggage; }
  } else {
    const boardMin = mins - 30;
    if (mins > 30) { label = `Boards in ${formatHM(boardMin)}`; sub = `Departs ${fmtTime(f.schedDep)} · be at airport by ${minOffset(f.schedDep, -120)}`; }
    else if (mins > 0) { label = `Departs in ${formatHM(mins)}`; sub = `Boarding now at gate ${f.gate}`; }
    else { label = `Departed ${fmtTime(f.actualDep)}`; sub = `In flight to ${f.to}`; }
  }
  return `
  <div class="glass rounded-2xl p-6">
    <div class="flex items-center justify-between mb-2">
      <div class="font-display font-bold">${isPickup?'Time to Arrival':'Time to Gate'}</div>
      <div class="text-[10px] uppercase tracking-widest muted">${isPickup?'Pickup mode':'Traveller mode'}</div>
    </div>
    <div class="font-display text-3xl md:text-4xl font-bold shimmer-text">${escapeHtml(label)}</div>
    <div class="text-sm muted mt-2">${escapeHtml(sub)}</div>
  </div>`;
}
function formatHM(m){ if (m < 0) m = 0; const h = Math.floor(m/60), mm = m%60; return h?`${h}h ${mm}m`:`${mm}m`; }
function minOffset(iso, offsetMin){
  const d = new Date(new Date(iso).getTime() + offsetMin*60000);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

                <span class="muted w-16">Actual</span>
                <span class="font-display text-xl ${delay>0?'text-danger':'text-mint'}">${fmtTime(f.actualDep)}</span>
                ${delay>0?`<span class="text-xs status-delayed px-2 py-0.5 rounded-full">+${delay} min</span>`:''}
              </div>
              <div class="muted text-xs mt-1">${fmtDate(f.schedDep)}</div>
            </div>
          </div>

          <div class="flex flex-col items-center text-mint">
            <div class="text-xs muted uppercase tracking-widest">${durationBetween(f.schedDep, f.schedArr)}</div>
            <svg viewBox="0 0 220 60" class="w-56 h-14 my-2">
              <path d="M10 45 Q 110 -10, 210 45" stroke="currentColor" stroke-opacity=".5" fill="none" class="planepath"/>
              <circle cx="10" cy="45" r="4" fill="currentColor"/>
              <circle cx="210" cy="45" r="4" fill="currentColor"/>
              <g transform="translate(110,15) rotate(15)"><path d="M-10 0 L10 0 L8 -3 L-8 -3 z M0 0 L0 8" fill="currentColor"/></g>
            </svg>
            <div class="text-[11px] muted">Direct</div>
          </div>

          <div class="text-right">
            <div class="font-display text-5xl md:text-6xl font-bold">${escapeHtml(arr.code)}</div>
            <div class="muted">${escapeHtml(arr.name)} · ${escapeHtml(arr.city)}</div>
            <div class="mt-3 text-sm">
              <div class="flex items-center gap-3 justify-end">
                <span class="font-display text-xl">${fmtTime(f.schedArr)}</span><span class="muted w-16 text-left">Sched</span>
              </div>
              <div class="flex items-center gap-3 justify-end mt-1">
                <span class="font-display text-xl ${delay>0?'text-danger':'text-mint'}">${fmtTime(f.actualArr)}</span>
                <span class="muted w-16 text-left">Actual</span>
              </div>
              <div class="muted text-xs mt-1">${fmtDate(f.schedArr)}</div>
            </div>
          </div>
        </div>

        <div class="mt-8 grid grid-cols-2 md:grid-cols-4 gap-3">
          ${[
            ['Gate', f.gate, '🚪'],
            ['Terminal', f.terminal, '🏢'],
            ['Baggage', f.baggage, '🧳'],
            ['Status', statusLabel(f.status), '📡'],
          ].map(([k,v,i]) => `
            <div class="glass rounded-xl p-4">
              <div class="text-xs muted">${i} ${k}</div>
              <div class="font-display text-2xl font-bold mt-1">${escapeHtml(v)}</div>
            </div>`).join('')}
        </div>

        <div class="mt-4 flex items-center justify-between text-xs muted">
          <div class="flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-mint animate-pulseDot"></span>
            Last updated <span id="lu">just now</span> · auto-refresh 30s
          </div>
          <div class="flex items-center gap-1 chip rounded-full p-1">
            <button data-mode="traveller" class="modeBtn px-3 py-1 rounded-full text-xs ${mode==='traveller'?'!bg-brand !text-white':''}">Traveller</button>
            <button data-mode="pickup" class="modeBtn px-3 py-1 rounded-full text-xs ${mode==='pickup'?'!bg-brand !text-white':''}">Pickup</button>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-6 grid lg:grid-cols-2 gap-5">
      ${Timeline(f)}
      ${CountdownPanel(f, mode)}
    </div>
    <div class="mt-5">
      ${InsightsPanel(f)}
    </div>

    ${f.note ? `<div class="mt-5 glass rounded-2xl p-4 text-sm"><span class="text-warn">Note:</span> ${escapeHtml(f.note)}</div>`:''}
  `;

  // last-updated ticker
  let secs = 0;
  const lu = document.getElementById('lu');
  const ticker = setInterval(() => {
    secs++;
    if (!document.body.contains(lu)) return clearInterval(ticker);
    lu.textContent = secs < 60 ? `${secs}s ago` : `${Math.floor(secs/60)}m ago`;
  }, 1000);

  // Save toggle
  document.getElementById('saveBtn').onclick = () => {
    const list = getSaved();
    const i = list.indexOf(f.flightNo);
    if (i >= 0) { list.splice(i,1); setSaved(list); toast('Removed from dashboard', 'info'); }
    else { list.push(f.flightNo); setSaved(list); toast('Saved to dashboard', 'success'); }
    bindFlight(flightNo);
  };

  // Mode toggle
  document.querySelectorAll('.modeBtn').forEach(b => b.onclick = () => {
    setPassMode(b.dataset.mode);
    bindFlight(flightNo);
  });
}

function DashboardPage(){
  return `
  ${Header()}
  <section class="max-w-7xl mx-auto px-5 pt-10 route-fade">
    <div class="flex items-end justify-between flex-wrap gap-3">
      <div>
        <h1 class="font-display text-3xl md:text-4xl font-bold">Your dashboard</h1>
        <p class="muted mt-1">Saved flights — auto-refreshing every 30 seconds.</p>
      </div>
      <a href="#/search" class="btn-primary rounded-lg px-4 py-2 text-sm font-semibold">+ Track a flight</a>
    </div>
    <div id="dash" class="mt-8 grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </section>
  ${Footer()}`;
}
function bindDashboard(){
  bindHeader();
  const dash = document.getElementById('dash');
  const ids = getSaved();
  if (!ids.length) {
    dash.innerHTML = `<div class="col-span-full glass rounded-2xl p-12 text-center">
      <div class="text-4xl mb-3">📭</div>
      <div class="font-display text-xl font-semibold">No saved flights yet</div>
      <p class="muted mt-1 text-sm">Search a flight and tap “Save flight” to add it here.</p>
      <a href="#/search" class="btn-primary rounded-lg px-4 py-2 text-sm inline-block mt-5">Search flights</a>
    </div>`;
    return;
  }
  dash.innerHTML = ids.map(id => {
    const f = FLIGHTS[id];
    return f ? FlightCard(f, { removable:true }) : '';
  }).join('');
  dash.querySelectorAll('.rmBtn').forEach(b => b.onclick = (e) => {
    e.preventDefault(); e.stopPropagation();
    const id = b.dataset.rm;
    const list = getSaved().filter(x => x !== id);
    setSaved(list);
    toast('Removed', 'info');
    bindDashboard();
  });
}

/* ============================== Router =================================== */

function parseHash(){
  const raw = location.hash.replace(/^#/, '') || '/';
  const [path, qs=''] = raw.split('?');
  return { path, params: new URLSearchParams(qs) };
}
function renderRoute(){
  const { path, params } = parseHash();
  const app = document.getElementById('app');
  let html = '';
  let onMount = () => {};
  if (path === '/' || path === '') { html = LandingPage(); onMount = bindLanding; }
  else if (path === '/login') { html = LoginPage(); onMount = bindLogin; }
  else if (path === '/search') { html = SearchPage(params); onMount = () => bindSearch(params); }
  else if (path.startsWith('/flight/')) {
    const no = decodeURIComponent(path.split('/')[2] || '').toUpperCase();
    html = FlightPage(no); onMount = () => bindFlight(no);
  }
  else if (path === '/dashboard') { html = DashboardPage(); onMount = bindDashboard; }
  else { html = `${Header()}<section class="max-w-2xl mx-auto px-5 py-24 text-center route-fade">
    <div class="font-display text-6xl font-bold">404</div>
    <p class="muted mt-2">Page not found.</p>
    <a href="#/" class="btn-primary rounded-lg px-4 py-2 text-sm inline-block mt-6">Go home</a></section>${Footer()}`; onMount = bindHeader; }
  app.innerHTML = html;
  window.scrollTo({ top:0, behavior:'instant' });
  onMount();
}

/* ============================== Boot ===================================== */
(function init(){
  // theme
  const t = localStorage.getItem(LS.theme);
  if (t === 'light') { document.documentElement.classList.add('light'); document.documentElement.classList.remove('dark'); }
  window.addEventListener('hashchange', renderRoute);
  renderRoute();
})();
</script>
